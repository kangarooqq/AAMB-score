<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AAMB Score Calculator</title>

    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px; /* 限制最大宽度 */
        }

        h1 { margin-top: 0; color: #2c3e50; font-size: 24px; text-align: center; }
        .abbr { font-size: 14px; color: #666; text-align: center; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px;}

        label { font-weight: bold; color: #34495e; font-size: 14px; }
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0 15px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }

        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        button {
            flex: 1; padding: 12px; border: none; border-radius: 6px;
            cursor: pointer; font-size: 16px; font-weight: bold;
        }
        .calc-btn { background-color: #2c7be5; color: white; }
        .calc-btn:hover { background-color: #1a5fd0; }
        .reset-btn { background-color: #95a5a6; color: white; }
        .reset-btn:hover { background-color: #7f8c8d; }

        #result { padding: 15px; border-radius: 6px; background: #f8f9fa; font-weight: bold; min-height: 50px; }
        .disclaimer { color: #7f8c8d; font-size: 12px; margin-top: 20px; font-style: italic; }
    </style>
</head>

<body>
    <div class="container">
        <h1>AAMB Score Calculator</h1>
        <p class="abbr">
    <strong>AAMB:</strong> Age, Age at Menarche & Menopause, and BMI
</p>
        <label>Age (40–65 years):</label>
        <input type="number" id="age" placeholder="e.g. 52">

        <label>Age at Menarche (8–18 years):</label>
        <input type="number" id="menarche" placeholder="e.g. 13">

        <label>Age at Menopause (35–60 years):</label>
        <input type="number" id="menopause" placeholder="e.g. 50">

        <label>BMI (15–40 kg/m²):</label>
        <input type="number" id="bmi" step="0.1" placeholder="e.g. 24.5">

        <div class="btn-group">
            <button class="calc-btn" onclick="calculateRisk()">Calculate Risk</button>
            <button class="reset-btn" onclick="resetForm()">Reset</button>
        </div>

        <h3>Result:</h3>
        <p id="result">Please enter patient data to calculate.</p>

        <p class="disclaimer">
            *This tool is a screening aid and not a diagnostic replacement for DXA. <br>
             Author: Cheng-Wei Kang · Initial Release: 2024.04.02 · Ver: 1.0
        </p>
    </div>

    <script>
        function calculateRisk() {
            var age = parseFloat(document.getElementById("age").value);
            var menarche = parseFloat(document.getElementById("menarche").value);
            var menopause = parseFloat(document.getElementById("menopause").value);
            var bmi = parseFloat(document.getElementById("bmi").value);

            var resultElement = document.getElementById("result");

            // 输入校验逻辑
            if (isNaN(age) || isNaN(menarche) || isNaN(menopause) || isNaN(bmi)) {
                alert("Please enter valid numbers in all fields."); return;
            }
            if (age < 40 || age > 65 || menarche < 8 || menarche > 20 || 
                menopause < 35 || menopause > 60 || bmi < 15 || bmi > 50) {
                alert("Please ensure all inputs are within the clinically reasonable range specified."); return;
            }

            var LP = 2.1186 + (0.1591 * age) - (0.1602 * menopause) + (0.1760 * menarche) - (0.1646 * bmi);
            var risk = 1 / (1 + Math.exp(-LP));
            var riskPercent = (risk * 100).toFixed(1);

            if (risk < 0.50) {
                resultElement.innerHTML = "<span style='color:#27ae60'>Low Risk (" + riskPercent + "%):</span> Lower probability of low BMD. Routine clinical follow-up suggested.";
            } else if (risk < 0.75) {
                resultElement.innerHTML = "<span style='color:#f39c12'>Intermediate Risk (" + riskPercent + "%):</span> Interpret with clinical judgment. Consider DXA if risk factors persist.";
            } else {
                resultElement.innerHTML = "<span style='color:#c0392b'>High Risk (" + riskPercent + "%):</span> DXA referral should be prioritized.";
            }
        }

        function resetForm() {
            ["age", "menarche", "menopause", "bmi"].forEach(id => document.getElementById(id).value = "");
            document.getElementById("result").innerText = "Please enter patient data to calculate.";
        }
    </script>
</body>
</html>
